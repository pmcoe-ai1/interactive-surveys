name: Sprint Pipeline

on:
  workflow_dispatch:
    inputs:
      sprint_number:
        description: 'Sprint number'
        required: true
        default: '1'
      resume_from:
        description: 'Resume from this job (leave empty for full run)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - testing-agent
          - test-run
          - fix-loop
          - review
      previous_run_id:
        description: 'Run ID to download artifacts from (required if resume_from is set)'
        required: false
        default: ''

permissions:
  contents: write
  actions: read
  id-token: write
  pull-requests: write
  issues: write

env:
  RESUME_FROM: ${{ github.event.inputs.resume_from }}
  PREVIOUS_RUN_ID: ${{ github.event.inputs.previous_run_id }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # JOB 1: CODING AGENT
  # Skips when: resume_from is any non-empty value
  # Replays: sprint-code
  # ═══════════════════════════════════════════════════════════════════════
  coding-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: surveys
          POSTGRES_PASSWORD: surveys
          POSTGRES_DB: surveys_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U surveys"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ── Resume control ──
      - name: Check if skipping
        id: skip_check
        run: |
          if [ -n "$RESUME_FROM" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping coding-agent — resuming from $RESUME_FROM"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate resume inputs
        if: env.RESUME_FROM != '' && env.PREVIOUS_RUN_ID == ''
        run: |
          echo "ERROR: resume_from='$RESUME_FROM' but previous_run_id is empty"
          echo "You must provide the run ID to download artifacts from."
          exit 1

      - name: Validate previous run artifacts exist
        if: env.RESUME_FROM != '' && env.PREVIOUS_RUN_ID != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/runs/$PREVIOUS_RUN_ID/artifacts --jq '.artifacts[].name')
          echo "Available artifacts in run $PREVIOUS_RUN_ID: $ARTIFACTS"
          echo "$ARTIFACTS" | grep -q "sprint-code" || { echo "ERROR: sprint-code artifact not found"; exit 1; }

      # ── Replay path (when skipping) ──
      - name: Replay sprint-code from previous run
        if: steps.skip_check.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/replay-sprint-code
          gh run download "$PREVIOUS_RUN_ID" -n sprint-code -D /tmp/replay-sprint-code
          echo "Downloaded sprint-code from run $PREVIOUS_RUN_ID"

      - uses: actions/upload-artifact@v4
        if: steps.skip_check.outputs.skip == 'true'
        with:
          name: sprint-code
          path: /tmp/replay-sprint-code/

      # ── Normal path (full run) ──
      - uses: actions/checkout@v4
        if: steps.skip_check.outputs.skip != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        if: steps.skip_check.outputs.skip != 'true'
        with:
          node-version: 20
      - run: npm ci
        if: steps.skip_check.outputs.skip != 'true'
      - name: Validate pipeline inputs
        if: steps.skip_check.outputs.skip != 'true'
        run: node scripts/validate-all.js --skip-jira --sprint ${{ github.event.inputs.sprint_number }} || echo "WARN - validation failed, continuing"

      - name: Create sprint branch
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git checkout -b sprint-${{ github.event.inputs.sprint_number }}-$(date +%s)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "Phase 1: Prisma schema, API routes, services"
        id: phase1
        if: steps.skip_check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@39431830520a7ae6c0c572f11a7707e7043325e3
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the Coding Agent for Sprint ${{ github.event.inputs.sprint_number }}, Phase 1.
            DATABASE_URL: postgresql://surveys:surveys@localhost:5432/surveys_dev

            This is an interactive survey tool (like Typeform) with OQAAT (one-question-at-a-time) UX.
            Tech stack: Next.js 14 (App Router), TypeScript, Prisma, Tailwind CSS, deployed to Railway.

            READ stories/sprint-${{ github.event.inputs.sprint_number }}.yaml — these are the stories to implement.
            READ entities.yaml — these are the data entities.
            READ prisma/schema.prisma — this is the current database schema.
            READ src/app.ts if it exists — this is the current app entry point.

            YOUR TASK — implement ALL stories in this sprint:

            1. UPDATE prisma/schema.prisma if new entities or fields are needed.
               Run: DATABASE_URL=postgresql://surveys:surveys@localhost:5432/surveys_dev npx prisma generate
               Run: DATABASE_URL=postgresql://surveys:surveys@localhost:5432/surveys_dev npx prisma migrate dev --name sprint-${{ github.event.inputs.sprint_number }}

            2. CREATE/UPDATE Next.js pages in src/app/ (App Router convention).
               CREATE API routes in src/app/api/ — one per resource.
               Each route must handle the scenarios defined in the stories.

            3. CREATE service files in src/services/ — business logic separate from routes.

            4. CREATE React components in src/components/ — one per UI element.
               Use Tailwind CSS for styling. Support OQAAT transitions (200-300ms).
               Keyboard navigation: Enter to advance, number keys for choices.

            5. Run: npx tsc --noEmit — fix ALL type errors before finishing.

            Do NOT write tests. Do NOT modify brd-skeleton.yaml. Phase 2 handles that.
            Focus ONLY on working, compiling code that covers every scenario.
          claude_args: |
            --max-turns 100
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(DATABASE_URL=*),Bash(cat:*),Bash(ls:*),Bash(mkdir:*),Bash(echo:*),Bash(kill:*),Bash(curl:*)
          settings: |
            {
              "env": {
                "DATABASE_URL": "postgresql://surveys:surveys@localhost:5432/surveys_dev"
              }
            }

      - name: Commit Phase 1 progress
        if: always() && steps.skip_check.outputs.skip != 'true'
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "feat: sprint ${{ github.event.inputs.sprint_number }} phase 1 — schema + routes + components"

      - name: "Phase 2: BRD fill + compilation check"
        id: phase2
        if: steps.skip_check.outputs.skip != 'true' && steps.phase1.outcome == 'success'
        uses: anthropics/claude-code-action@39431830520a7ae6c0c572f11a7707e7043325e3
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the Coding Agent for Sprint ${{ github.event.inputs.sprint_number }}, Phase 2.

            Phase 1 already wrote the code. Your job is to fill BRD sections and verify compilation.

            1. READ stories/sprint-${{ github.event.inputs.sprint_number }}.yaml
            2. READ brd-skeleton.yaml
            3. For EACH story in this sprint, fill these BRD fields:
               - scenarios: add coverageType (happy/edge/failure), expectedResult (true/false)
               - glossary: add definitions for any entities referenced by these stories
               - error codes: declare all error responses (HTTP status + error body)
               - domainEvents: declare state change events (e.g. survey.created, question.added)
            4. Write the updated brd-skeleton.yaml
            5. Run: npx tsc --noEmit — if there are type errors from Phase 1, fix them.
            6. Verify the app starts: DATABASE_URL=postgresql://surveys:surveys@localhost:5432/surveys_dev npx ts-node src/app.ts &
               Wait 2 seconds, then: curl http://localhost:3000/health || curl http://localhost:3000/api/health
               Kill the background process.
          claude_args: |
            --max-turns 50
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(DATABASE_URL=*),Bash(cat:*),Bash(ls:*),Bash(mkdir:*),Bash(echo:*),Bash(kill:*),Bash(curl:*),Bash(sleep:*)
          settings: |
            {
              "env": {
                "DATABASE_URL": "postgresql://surveys:surveys@localhost:5432/surveys_dev"
              }
            }

      - uses: actions/upload-artifact@v4
        if: always() && steps.skip_check.outputs.skip != 'true'
        with:
          name: sprint-code
          path: |
            .
            !node_modules
            !.git
      - name: Push changes (non-fatal)
        if: steps.skip_check.outputs.skip != 'true'
        continue-on-error: true
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "feat: sprint ${{ github.event.inputs.sprint_number }} phase 2 — BRD + verify"
          git push --set-upstream origin HEAD

  # ═══════════════════════════════════════════════════════════════════════
  # JOB 2: TESTING AGENT
  # Skips when: resume_from is test-run, fix-loop, or review
  # Replays: sprint-code-with-tests
  # ═══════════════════════════════════════════════════════════════════════
  testing-agent:
    needs: coding-agent
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check if skipping
        id: skip_check
        run: |
          if [ "$RESUME_FROM" = "test-run" ] || [ "$RESUME_FROM" = "fix-loop" ] || [ "$RESUME_FROM" = "review" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping testing-agent — resuming from $RESUME_FROM"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Replay path (when skipping) ──
      - name: Replay sprint-code-with-tests from previous run
        if: steps.skip_check.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/replay-tested
          gh run download "$PREVIOUS_RUN_ID" -n sprint-code-with-tests -D /tmp/replay-tested

      - uses: actions/upload-artifact@v4
        if: steps.skip_check.outputs.skip == 'true'
        with:
          name: sprint-code-with-tests
          path: /tmp/replay-tested/

      # ── Normal/resume path ──
      # Download from this run (normal) or previous run (resume target)
      - uses: actions/download-artifact@v4
        if: steps.skip_check.outputs.skip != 'true' && env.RESUME_FROM == ''
        with:
          name: sprint-code

      - name: Download sprint-code from previous run
        if: steps.skip_check.outputs.skip != 'true' && env.RESUME_FROM != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run download "$PREVIOUS_RUN_ID" -n sprint-code

      - uses: actions/setup-node@v4
        if: steps.skip_check.outputs.skip != 'true'
        with:
          node-version: 20
      - run: npm ci
        if: steps.skip_check.outputs.skip != 'true'
      - name: Make source code read-only
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          chmod -R a-w src/ || true
          chmod -R a-w prisma/ || true
      - name: Testing Agent writes tests
        if: steps.skip_check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@39431830520a7ae6c0c572f11a7707e7043325e3
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the Testing Agent for Sprint ${{ github.event.inputs.sprint_number }}.
            This is an interactive survey tool (Next.js, Prisma, PostgreSQL).
            READ-ONLY on src/ and prisma/. Do NOT modify files outside tests/.

            Read stories/sprint-${{ github.event.inputs.sprint_number }}.yaml for scenarios.
            Read src/ and prisma/schema.prisma to understand the code (READ ONLY).

            Write tests in tests/sprint-${{ github.event.inputs.sprint_number }}/ directory.
            Name test files descriptively based on the domain.

            Requirements:
            - Use supertest + Testcontainers (@testcontainers/postgresql) for real PostgreSQL
            - Each describe block must include the scenario ID (e.g. "SC0.1.1")
            - beforeAll: start PG container, set DATABASE_URL, run prisma migrate deploy
            - afterAll: stop container
            - Between tests: clean all DB tables with DELETE FROM
            - At least one test per scenario
            - Do NOT modify files outside tests/
            - Do NOT run the tests — Job 3 runs them deterministically
          claude_args: |
            --max-turns 50
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(npm:*),Bash(npx:*),Bash(cat:*),Bash(ls:*),Bash(mkdir:*)
      - name: Restore permissions
        if: always() && steps.skip_check.outputs.skip != 'true'
        run: |
          chmod -R u+w src/ || true
          chmod -R u+w prisma/ || true
      - uses: actions/upload-artifact@v4
        if: always() && steps.skip_check.outputs.skip != 'true'
        with:
          name: sprint-code-with-tests
          path: |
            .
            !node_modules
            !.git

  # ═══════════════════════════════════════════════════════════════════════
  # JOB 3: TEST RUN (deterministic — no AI)
  # Skips when: resume_from is fix-loop or review
  # Replays: sprint-code-tested + test-results
  # Special: deliberately fails when resume_from=fix-loop
  # ═══════════════════════════════════════════════════════════════════════
  test-run:
    needs: testing-agent
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check if skipping
        id: skip_check
        run: |
          if [ "$RESUME_FROM" = "fix-loop" ] || [ "$RESUME_FROM" = "review" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping test-run — resuming from $RESUME_FROM"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Replay path (when skipping) ──
      - name: Replay sprint-code-tested from previous run
        if: steps.skip_check.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/replay-code-tested
          gh run download "$PREVIOUS_RUN_ID" -n sprint-code-tested -D /tmp/replay-code-tested

      - uses: actions/upload-artifact@v4
        if: steps.skip_check.outputs.skip == 'true'
        with:
          name: sprint-code-tested
          path: /tmp/replay-code-tested/

      - name: Replay test-results from previous run
        if: steps.skip_check.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/replay-test-results
          gh run download "$PREVIOUS_RUN_ID" -n test-results -D /tmp/replay-test-results

      - uses: actions/upload-artifact@v4
        if: steps.skip_check.outputs.skip == 'true'
        with:
          name: test-results
          path: /tmp/replay-test-results/

      # Deliberately fail when resuming into fix-loop so failure() triggers it
      - name: Replay failure for fix-loop resume
        if: steps.skip_check.outputs.skip == 'true' && env.RESUME_FROM == 'fix-loop'
        run: |
          echo "Deliberately failing test-run so fix-loop triggers"
          exit 1

      # ── Normal/resume path ──
      - uses: actions/download-artifact@v4
        if: steps.skip_check.outputs.skip != 'true' && env.RESUME_FROM == ''
        with:
          name: sprint-code-with-tests

      - name: Download sprint-code-with-tests from previous run
        if: steps.skip_check.outputs.skip != 'true' && env.RESUME_FROM != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run download "$PREVIOUS_RUN_ID" -n sprint-code-with-tests

      - uses: actions/setup-node@v4
        if: steps.skip_check.outputs.skip != 'true'
        with:
          node-version: 20
      - run: npm ci
        if: steps.skip_check.outputs.skip != 'true'
      - name: Generate Prisma Client
        if: steps.skip_check.outputs.skip != 'true'
        run: npx prisma generate
      - name: Run tests (deterministic — no AI)
        id: tests
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          set -o pipefail
          if npx jest --ci --passWithNoTests --json --outputFile=test-results.json --forceExit 2>&1 | tee test-output.txt; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always() && steps.skip_check.outputs.skip != 'true'
        with:
          name: test-results
          path: |
            test-results.json
            test-output.txt
      - uses: actions/upload-artifact@v4
        if: always() && steps.skip_check.outputs.skip != 'true'
        with:
          name: sprint-code-tested
          path: |
            .
            !node_modules
            !.git
      - name: Fail if tests failed
        if: steps.skip_check.outputs.skip != 'true' && steps.tests.outputs.tests_passed == 'false'
        run: exit 1

  # ═══════════════════════════════════════════════════════════════════════
  # JOB 4: FIX LOOP
  # Runs when: test-run failed OR resume_from=fix-loop
  # Skips when: resume_from=review
  # ═══════════════════════════════════════════════════════════════════════
  fix-loop:
    needs: test-run
    if: failure() || github.event.inputs.resume_from == 'fix-loop'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check if skipping
        id: skip_check
        run: |
          if [ "$RESUME_FROM" = "review" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping fix-loop — resuming from review"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Normal path: download from this run ──
      - uses: actions/download-artifact@v4
        if: steps.skip_check.outputs.skip != 'true' && env.RESUME_FROM == ''
        with:
          name: sprint-code-tested

      # ── Resume path: download from previous run ──
      - name: Download sprint-code-tested from previous run
        if: steps.skip_check.outputs.skip != 'true' && env.RESUME_FROM != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download "$PREVIOUS_RUN_ID" -n sprint-code-tested
          gh run download "$PREVIOUS_RUN_ID" -n test-results

      - uses: actions/setup-node@v4
        if: steps.skip_check.outputs.skip != 'true'
        with:
          node-version: 20
      - run: npm ci
        if: steps.skip_check.outputs.skip != 'true'
      - name: Fix and re-test
        if: steps.skip_check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@39431830520a7ae6c0c572f11a7707e7043325e3
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Tests failed for Sprint ${{ github.event.inputs.sprint_number }}.
            Read test-results.json and test-output.txt for failure details.

            Fix ONLY files in src/. Do NOT modify anything in tests/.
            The tests are the specification — if they fail, the code is wrong.

            After each fix attempt:
            1. npx tsc --noEmit
            2. npx prisma generate
            3. npx jest --passWithNoTests --json --outputFile=test-results.json --forceExit 2>&1 | tee test-output.txt

            Max 3 attempts. If still failing after 3, report remaining failures.
          claude_args: |
            --max-turns 40
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(cat:*),Bash(ls:*)
      - name: Verify fixes (max 3 attempts)
        id: verify
        if: always() && steps.skip_check.outputs.skip != 'true'
        run: |
          npx prisma generate
          for attempt in 1 2 3; do
            echo "=== Test attempt $attempt of 3 ==="
            if npx jest --ci --passWithNoTests --json --outputFile=test-results.json --forceExit 2>&1 | tee test-output.txt; then
              echo "Tests passed on attempt $attempt"
              echo "fix_succeeded=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt failed"
            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 5s..."
              sleep 5
            fi
          done
          echo "All 3 attempts failed"
          echo "fix_succeeded=false" >> "$GITHUB_OUTPUT"
          exit 1
      - uses: actions/upload-artifact@v4
        if: always() && steps.skip_check.outputs.skip != 'true'
        with:
          name: sprint-code-fixed
          path: |
            .
            !node_modules
            !.git
      - uses: actions/upload-artifact@v4
        if: always() && steps.skip_check.outputs.skip != 'true'
        with:
          name: test-results-fixed
          path: |
            test-results.json
            test-output.txt

  # ═══════════════════════════════════════════════════════════════════════
  # JOB 5: REVIEW
  # ═══════════════════════════════════════════════════════════════════════
  review:
    needs: [test-run, fix-loop]
    if: >-
      always() &&
      (needs.test-run.result == 'success' ||
       needs.fix-loop.result == 'success' ||
       github.event.inputs.resume_from == 'review')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── Resume path: download from previous run ──
      - name: Download code from previous run (resume mode)
        if: env.RESUME_FROM == 'review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh run download "$PREVIOUS_RUN_ID" -n sprint-code-fixed 2>/dev/null; then
            echo "Downloaded sprint-code-fixed from previous run"
          else
            gh run download "$PREVIOUS_RUN_ID" -n sprint-code-tested
            echo "Downloaded sprint-code-tested from previous run (no fix artifact)"
          fi
          # Also grab test results
          gh run download "$PREVIOUS_RUN_ID" -n test-results-fixed 2>/dev/null || \
            gh run download "$PREVIOUS_RUN_ID" -n test-results 2>/dev/null || true

      # ── Normal path ──
      - uses: actions/download-artifact@v4
        if: env.RESUME_FROM != 'review' && needs.fix-loop.result == 'success'
        with:
          name: sprint-code-fixed
      - uses: actions/download-artifact@v4
        if: env.RESUME_FROM != 'review' && needs.fix-loop.result != 'success'
        with:
          name: sprint-code-tested
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Review Agent
        uses: anthropics/claude-code-action@39431830520a7ae6c0c572f11a7707e7043325e3
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review Agent for Sprint ${{ github.event.inputs.sprint_number }}. Tests passed.

            This is an interactive survey tool (Next.js, Prisma, Tailwind CSS).

            Read these files:
            - stories/sprint-${{ github.event.inputs.sprint_number }}.yaml (scenarios)
            - All files in src/ (source code)
            - All files in tests/sprint-${{ github.event.inputs.sprint_number }}/ (test files)
            - test-results.json (test outcomes)
            - brd-skeleton.yaml (BRD sections filled this sprint)

            Check:
            1. Scenario coverage: every scenario ID has a matching passing test
            2. Error codes: every error thrown in src/ is tested
            3. Error handling: proper HTTP status codes, no unhandled rejections
            4. Code quality: no hardcoded values, proper separation of concerns
            5. BRD consistency: filled sections match the code
            6. OQAAT UX: keyboard nav, transitions, progress bar (if applicable this sprint)

            Write review to review-report.md with:
            - SCENARIO COVERAGE: table of scenario ID → test name → PASS/FAIL
            - FINDINGS: numbered list (severity: HIGH/MEDIUM/LOW)
            - SUMMARY: one paragraph assessment
          claude_args: |
            --max-turns 20
            --allowedTools Read,Glob,Grep,LS,Write,Edit
      - uses: actions/upload-artifact@v4
        with:
          name: review-report
          path: review-report.md
