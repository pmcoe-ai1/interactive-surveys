# BRD Skeleton — Interactive Surveys
# Generated deterministically from: direction.md, epics.yaml, stories/*.yaml, entities.yaml
# Step 4b: Every field is a direct copy, string transformation, or arithmetic. No AI judgment.

header:
  domain: Interactive Surveys
  date: "2026-04-15"
  author: Alan Kwon
  version: "0.1.0"
  status: skeleton
  deployment: railway.com

features:
  - id: F1
    name: Survey Builder
    description: Drag-and-drop survey builder with inline editing, reordering, duplication, preview, and publish
    epicRef: E1
    jiraKey: ISURV-1

  - id: F2
    name: Question Types
    description: Ten question types including short text, long text, single/multiple choice, rating, yes/no, dropdown, date picker, welcome screen, thank-you screen
    epicRef: E2
    jiraKey: ISURV-2

  - id: F3
    name: OQAAT Respondent Experience
    description: One-question-at-a-time respondent flow with keyboard navigation, mobile-first layout, progress indicator, and smooth transitions (200-300ms)
    epicRef: E3
    jiraKey: ISURV-3

  - id: F4
    name: Conditional Logic
    description: Skip logic, conditional show/hide, logic preview with validation for broken and circular rules
    epicRef: E4
    jiraKey: ISURV-4

  - id: F5
    name: Response Collection
    description: Complete and partial response capture, anonymous/identified modes, duplicate prevention
    epicRef: E5
    jiraKey: ISURV-5

  - id: F6
    name: Analytics Dashboard
    description: Response summary, per-question breakdown with charts, completion funnel, CSV/JSON export
    epicRef: E6
    jiraKey: ISURV-6

  - id: F7
    name: Sharing and Distribution
    description: Shareable links with custom slugs, embeddable iframe/JS widget, QR code generation, Open Graph meta tags
    epicRef: E7
    jiraKey: ISURV-7

  - id: F8
    name: Authentication and Creator Dashboard
    description: Magic link and OAuth sign-up/login, creator dashboard with survey list/grid, logout with session management
    epicRef: E8
    jiraKey: ISURV-8

  - id: F9
    name: Survey Settings and Themes
    description: Open/close toggle, response limits, scheduled open/close dates, 5 visual themes, custom thank-you and redirect
    epicRef: E9
    jiraKey: ISURV-9

  - id: F10
    name: Templates and Onboarding
    description: Pre-built survey templates (NPS, CSAT, Event, Product, Employee), template customization, first-run onboarding flow
    epicRef: E10
    jiraKey: ISURV-10

intents:
  # E1: Survey Builder
  - id: I1.1
    title: Create new survey
    description: As a survey creator, I want to create a new blank survey with a title, so that I have a starting point for building my survey
    featureRef: F1
    storyRef: S1.1
    jiraKey: ISURV-11
    priority: high

  - id: I1.2
    title: Add questions to survey
    description: As a survey creator, I want to add questions from a type picker (10 types), so that I can build the content of my survey
    featureRef: F1
    storyRef: S1.2
    jiraKey: ISURV-12
    priority: high

  - id: I1.3
    title: Edit question inline
    description: As a survey creator, I want to click a question and edit its text, options, and settings inline, so that I can refine questions without leaving the builder
    featureRef: F1
    storyRef: S1.3
    jiraKey: ISURV-13
    priority: high

  - id: I1.4
