# ─── Error Codes (filled Sprint 1) ────────────────────────────────────────────

errorCodes:
  # Health
  - code: HEALTH_DB_ERROR
    httpStatus: 503
    body: { status: "error", database: "disconnected" }
    description: "Database unreachable at health-check time"
    routes:
      - "GET /health"

  # Authentication
  - code: UNAUTHORIZED
    httpStatus: 401
    body: { error: "Unauthorized" }
    description: "Request lacks a valid session; user must log in"
    routes:
      - "GET /api/surveys"
      - "POST /api/surveys"
      - "GET /api/surveys/:id"
      - "PATCH /api/surveys/:id"
      - "DELETE /api/surveys/:id"
      - "GET /api/surveys/:id/questions"
      - "POST /api/surveys/:id/questions"
      - "PUT /api/surveys/:id/questions"
      - "PATCH /api/surveys/:id/questions/:qid"
      - "DELETE /api/surveys/:id/questions/:qid"

  # Survey — creation / update / delete
  - code: SURVEY_TITLE_REQUIRED
    httpStatus: 400
    body: { error: "Title is required" }
    description: "POST /api/surveys called with missing or blank title"
    routes:
      - "POST /api/surveys"

  - code: SURVEY_NOT_FOUND
    httpStatus: 404
    body: { error: "Survey not found" }
    description: "No survey exists with the given ID owned by the requesting user"
    routes:
      - "GET /api/surveys/:id"
      - "PATCH /api/surveys/:id"
      - "DELETE /api/surveys/:id"
      - "GET /api/surveys/:id/questions"
      - "POST /api/surveys/:id/questions"
      - "PUT /api/surveys/:id/questions"
      - "PATCH /api/surveys/:id/questions/:qid"
      - "DELETE /api/surveys/:id/questions/:qid"

  - code: SURVEY_UPDATE_FAILED
    httpStatus: 400
    body: { error: "Failed to update survey" }
    description: "Generic survey update failure (e.g. invalid field value)"
    routes:
      - "PATCH /api/surveys/:id"

  - code: SURVEY_DELETE_FAILED
    httpStatus: 400
    body: { error: "Failed to delete survey" }
    description: "Generic survey deletion failure"
    routes:
      - "DELETE /api/surveys/:id"

  - code: SURVEY_CREATE_FAILED
    httpStatus: 400
    body: { error: "Failed to create survey" }
    description: "Generic survey creation failure (e.g. slug collision after retries)"
    routes:
      - "POST /api/surveys"

  # Question
  - code: QUESTION_TYPE_REQUIRED
    httpStatus: 400
    body: { error: "Question type is required" }
    description: "POST /api/surveys/:id/questions called without a type field"
    routes:
      - "POST /api/surveys/:id/questions"

  - code: QUESTION_TYPE_INVALID
    httpStatus: 400
    body: { error: "Invalid question type: {type}" }
    description: "Supplied type value is not one of the 10 valid QuestionType enum values"
    routes:
      - "POST /api/surveys/:id/questions"

  - code: QUESTION_REORDER_INVALID
    httpStatus: 400
    body: { error: "orderedIds array is required" }
    description: "PUT /api/surveys/:id/questions called without an orderedIds array"
    routes:
      - "PUT /api/surveys/:id/questions"

  - code: QUESTION_ADD_FAILED
    httpStatus: 400
    body: { error: "Failed to add question" }
    description: "Generic failure adding a question"
    routes:
      - "POST /api/surveys/:id/questions"

  - code: QUESTION_UPDATE_FAILED
    httpStatus: 400
    body: { error: "Failed to update question" }
    description: "Generic failure updating a question"
    routes:
      - "PATCH /api/surveys/:id/questions/:qid"

  - code: QUESTION_DELETE_FAILED
    httpStatus: 400
    body: { error: "Failed to delete question" }
    description: "Generic failure deleting a question"
    routes:
      - "DELETE /api/surveys/:id/questions/:qid"

  # Response / Respondent
  - code: RESPONSE_SURVEY_NOT_FOUND
    httpStatus: 404
    body: { error: "Survey not found" }
    description: "No published survey exists at the given slug"
    routes:
      - "POST /api/s/:slug/responses"

  - code: RESPONSE_SURVEY_CLOSED
    httpStatus: 403
    body: { error: "Survey is closed" }
    description: "Respondent attempted to start a response on a closed survey"
    routes:
      - "POST /api/s/:slug/responses"

  - code: ANSWER_QUESTION_REQUIRED
    httpStatus: 400
    body: { error: "questionId is required" }
    description: "POST answers called without a questionId"
    routes:
      - "POST /api/s/:slug/responses/:rid/answers"

  - code: ANSWER_SAVE_FAILED
    httpStatus: 400
    body: { error: "Failed to save answer" }
    description: "Generic failure saving an answer (e.g. invalid responseId)"
    routes:
      - "POST /api/s/:slug/responses/:rid/answers"

  - code: RESPONSE_NOT_FOUND
    httpStatus: 400
    body: { error: "Response not found" }
    description: "completeResponse called with an unknown responseId"
    routes:
      - "POST /api/s/:slug/responses/:rid/complete"

  - code: RESPONSE_COMPLETE_FAILED
    httpStatus: 400
    body: { error: "Failed to complete response" }
    description: "Generic failure marking a response complete"
    routes:
      - "POST /api/s/:slug/responses/:rid/complete"

# ─── Domain Events (filled Sprint 1) ──────────────────────────────────────────

domainEvents:
  # Authentication & User lifecycle
  - event: user.signed_up
    trigger: "New User row created via NextAuth signIn callback"
    payload:
      userId: string
      email: string
      authProvider: "email | google | github"
    storyRefs: [S8.1]

  - event: user.signed_in
    trigger: "Returning user authenticates successfully (magic link verified or OAuth token exchanged)"
    payload:
      userId: string
      authProvider: "email | google | github"
    storyRefs: [S8.2]

  - event: user.signed_out
    trigger: "User calls NextAuth signOut; session row deleted from database"
    payload:
      userId: string
    storyRefs: [S8.4]

  # Survey lifecycle
  - event: survey.created
    trigger: "POST /api/surveys returns 201; Survey row inserted with status=draft"
    payload:
      surveyId: string
      userId: string
      title: string
      slug: string
    storyRefs: [S1.1]

  - event: survey.updated
    trigger: "PATCH /api/surveys/:id returns 200; Survey row modified"
    payload:
      surveyId: string
      userId: string
      changedFields: "string[]"
    storyRefs: [S1.1]

  - event: survey.published
    trigger: "PATCH /api/surveys/:id with status=live; survey becomes accessible to respondents"
    payload:
      surveyId: string
      userId: string
      slug: string
    storyRefs: [S1.1]

  - event: survey.deleted
    trigger: "DELETE /api/surveys/:id; Survey row and all cascaded children removed"
    payload:
      surveyId: string
      userId: string
    storyRefs: [S1.1]

  # Question lifecycle
  - event: question.added
    trigger: "POST /api/surveys/:id/questions returns 201; Question row inserted"
    payload:
      questionId: string
      surveyId: string
      type: string
      order: number
      warningIssued: boolean
    storyRefs: [S1.2, S2.1, S2.3, S2.6, S2.9]

  - event: question.updated
    trigger: "PATCH /api/surveys/:id/questions/:qid returns 200; Question row modified"
    payload:
      questionId: string
      surveyId: string
      changedFields: "string[]"
    storyRefs: [S1.2]

  - event: question.deleted
    trigger: "DELETE /api/surveys/:id/questions/:qid; Question row removed and remaining questions re-ordered"
    payload:
      questionId: string
      surveyId: string
    storyRefs: [S1.2]

  - event: question.reordered
    trigger: "PUT /api/surveys/:id/questions with orderedIds array; all question order fields updated"
    payload:
      surveyId: string
      orderedIds: "string[]"
    storyRefs: [S1.2]

  # Response lifecycle
  - event: response.started
    trigger: "POST /api/s/:slug/responses returns 201; Response row inserted with status=partial"
    payload:
      responseId: string
      surveyId: string
      browserFingerprint: "string | null"
    storyRefs: [S2.1, S2.3, S2.6, S2.9]

  - event: response.answer_saved
    trigger: "POST /api/s/:slug/responses/:rid/answers returns 201; Answer row inserted"
    payload:
      answerId: string
      responseId: string
      questionId: string
    storyRefs: [S2.1, S2.3, S2.6, S2.9]

  - event: response.completed
    trigger: "POST /api/s/:slug/responses/:rid/complete; Response status set to complete and survey responseCount incremented"
    payload:
      responseId: string
      surveyId: string
      completionTimeSeconds: number
    storyRefs: [S2.1, S2.3, S2.6, S2.9]

