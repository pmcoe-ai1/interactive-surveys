glossary:
  - id: G1
    term: Survey
    entityRef: Survey
    definition: >
      A collection of questions created and owned by a User, with configurable settings
      (title, description, slug, status, theme, response limits, open/close schedule).
      A Survey progresses through statuses: draft → live → closed.

  - id: G2
    term: Question
    entityRef: Question
    definition: >
      An individual item within a Survey, defined by a QuestionType and display order.
      Questions carry type-specific properties (placeholder, validation, rating style,
      options, etc.) and are presented to respondents one at a time (OQAAT).

  - id: G3
    term: QuestionOption
    entityRef: QuestionOption
    definition: >
      A selectable answer choice belonging to a choice-based Question
      (single_choice, multiple_choice, or dropdown). Options have display text and
      an explicit order index.

  - id: G4
    term: Response
    entityRef: Response
    definition: >
      A respondent's interaction session with a published Survey. A Response starts
      in status "partial" when the respondent opens the survey and transitions to
      "complete" when they submit the final answer. Optionally linked to a browser
      fingerprint for duplicate prevention.

  - id: G5
    term: Answer
    entityRef: Answer
    definition: >
      A single respondent's reply to one Question within a Response session. Stores
      the answer payload in the appropriate typed field: value (text), selectedOptions
      (JSON array of option IDs), numericValue (rating/number), or dateValue (date).

  - id: G6
    term: LogicRule
    entityRef: LogicRule
    definition: >
      A conditional rule attached to a Survey that controls respondent flow.
      A rule has a type (skip_to, show_if, hide_if), a source Question whose answer
      is evaluated, a conditionValue to match against, and a target Question to
      navigate to or toggle visibility on.

  - id: G7
    term: User
    entityRef: User
    definition: >
      An authenticated survey creator identified by a unique email address.
      Users sign up via magic link (email) or OAuth (Google, GitHub). Each User
      owns their Surveys exclusively; ownership is enforced on all write operations.

  - id: G8
    term: SurveyTemplate
    entityRef: SurveyTemplate
    definition: >
      A pre-built Survey scaffold with a predefined set of questions for common
      use cases. Templates are categorised (nps, csat, event_feedback,
      product_feedback, employee_pulse) and serve as a starting point for new Surveys.

  - id: G9
    term: OQAAT
    definition: "One Question At A Time — interaction pattern where respondents see a single question per screen"

  - id: G10
    term: Magic Link
    definition: "Passwordless authentication via a one-time URL sent to the user's email"

  - id: G11
    term: Skip Logic
    definition: "Conditional rule that skips the respondent to a different question based on their answer"

  - id: G12
    term: Completion Funnel
    definition: "Analytics visualization showing respondent drop-off at each question"

  - id: G13
    term: Survey Builder
    definition: >
      The creator-facing interface for constructing a Survey. Supports adding,
      editing, reordering, duplicating, and deleting Questions, plus live preview
      and publish actions.

  - id: G14
    term: Slug
    definition: >
      A URL-safe string derived from the Survey title, used to form the public
      respondent URL (e.g., /s/my-survey-abc123). Slugs are unique across all surveys.

  - id: G15
    term: Draft
    definition: >
      The default SurveyStatus after creation. A draft survey is editable and
      accessible only to its owner; respondents cannot submit responses to a draft
      survey in production.

  - id: G16
    term: Browser Fingerprint
    definition: >
      A client-supplied identifier (sent via the x-browser-fingerprint header or
      request body) used for duplicate-response prevention when anonymousResponses
      is enabled.

