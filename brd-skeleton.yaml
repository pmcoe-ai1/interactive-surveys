scenarios:
  # Copied from stories/*.yaml — one entry per Given/When/Then
  # 150 total scenarios across 50 stories
  # Format: id, intentRef, given, when, then
  # Sections NOT filled at skeleton stage: coverageType, expectedResult

  # E1 scenarios (24)
  - { id: SC1.1.1, intentRef: I1.1, given: "I am logged in", when: "I click Create Survey and enter a title", then: "a new survey is created and I see the empty builder" }
  - { id: SC1.1.2, intentRef: I1.1, given: "I am logged in", when: "I try to create a survey without a title", then: "I see a validation error Title is required" }
  - { id: SC1.1.3, intentRef: I1.1, given: "I am not logged in", when: "I try to access the create survey page", then: "I am redirected to the login page" }
  - { id: SC1.2.1, intentRef: I1.2, given: "I have an open survey in the builder", when: "I click Add Question and select Short Text", then: "a short text question is appended to the survey" }
  - { id: SC1.2.2, intentRef: I1.2, given: "I have an open survey", when: "I add a question of each of the 10 types", then: "all 10 render correctly in the builder" }
  - { id: SC1.2.3, intentRef: I1.2, given: "I have an open survey with 50 questions", when: "I add another question", then: "I see a warning about lower completion rates" }
  - { id: SC1.3.1, intentRef: I1.3, given: "a survey with questions", when: "I click on a question text", then: "the text becomes editable and I can type changes" }
  - { id: SC1.3.2, intentRef: I1.3, given: "I am editing a choice question", when: "I add/remove/reorder options", then: "the options update in real-time" }
  - { id: SC1.3.3, intentRef: I1.3, given: "I am editing a question", when: "I click outside or press Escape", then: "the edit is saved automatically" }
  - { id: SC1.4.1, intentRef: I1.4, given: "a survey with 3+ questions", when: "I drag question 3 above question 1", then: "the order updates to 3, 1, 2" }
  - { id: SC1.4.2, intentRef: I1.4, given: "I am dragging a question", when: "I drop it in the same position", then: "nothing changes" }
  - { id: SC1.4.3, intentRef: I1.4, given: "I am on a mobile device", when: "I use the move up/down buttons", then: "the question reorders (touch-friendly fallback)" }
  - { id: SC1.5.1, intentRef: I1.5, given: "a survey with questions", when: "I click the delete button on a question and confirm", then: "the question is removed" }
  - { id: SC1.5.2, intentRef: I1.5, given: "a survey with one question", when: "I delete it", then: "the survey shows an empty state" }
  - { id: SC1.5.3, intentRef: I1.5, given: "I click delete", when: "the confirmation dialog appears and I cancel", then: "the question is not removed" }
  - { id: SC1.6.1, intentRef: I1.6, given: "a survey with a configured question", when: "I click Duplicate", then: "a copy appears below with the same type, text, and options" }
  - { id: SC1.6.2, intentRef: I1.6, given: "I duplicate a question with conditional logic", when: "the copy is created", then: "the logic rules are not copied" }
  - { id: SC1.6.3, intentRef: I1.6, given: "I duplicate a question", when: "the copy appears", then: "its title is suffixed with (copy)" }
  - { id: SC1.7.1, intentRef: I1.7, given: "I am in the builder with questions", when: "I click Preview", then: "I see the OQAAT respondent view with my questions" }
  - { id: SC1.7.2, intentRef: I1.7, given: "I am previewing", when: "I make changes in the builder", then: "the preview updates in real-time" }
  - { id: SC1.7.3, intentRef: I1.7, given: "I am previewing on desktop", when: "I toggle Mobile preview", then: "the preview shows a mobile viewport width" }
  - { id: SC1.8.1, intentRef: I1.8, given: "a survey with at least one question", when: "I click Publish", then: "the survey becomes live and I see the shareable link" }
  - { id: SC1.8.2, intentRef: I1.8, given: "a survey with no questions", when: "I try to publish", then: "I see an error" }
  - { id: SC1.8.3, intentRef: I1.8, given: "a published survey", when: "I make edits", then: "I see a Republish button" }

